<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 200" width="560" height="200">
  <defs>
    <!-- Main brand gradient: deep indigo → vivid purple -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3730A3"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>

    <!-- Icon face gradient (slightly lighter to give icon depth) -->
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4338CA"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>

    <!-- Arrow/accent gradient -->
    <linearGradient id="arrowGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>

  <!-- ═══════════════════════════════════════ -->
  <!--  ICON — rounded-square badge           -->
  <!-- ═══════════════════════════════════════ -->
  <!-- Badge background -->
  <rect x="20" y="20" width="160" height="160" rx="36" ry="36" fill="url(#iconGrad)"/>

  <!--
    Merged F + upward arrow concept:
    • The "F" is built from two horizontal bars on a vertical stem.
    • The stem's top extends into an upward arrow head.
    • Everything lives on a 160×160 canvas (offset +20,+20).
    Local origin: (100, 100) = centre of badge.
  -->

  <!-- Vertical stem of F (extends upward beyond the top bar → becomes arrow shaft) -->
  <rect x="74" y="52" width="18" height="96" rx="4" fill="white"/>

  <!-- Top horizontal bar of F -->
  <rect x="74" y="52" width="58" height="18" rx="4" fill="white"/>

  <!-- Mid horizontal bar of F (shorter — classic F proportion) -->
  <rect x="74" y="91" width="44" height="16" rx="4" fill="white"/>

  <!--
    Upward arrow head, sitting on top of the stem.
    Tip at (83, 32) — above the badge top bar area.
    Wide chevron pointing up.
  -->
  <polygon points="83,30 116,62 100,62 100,52 83,52 66,52 66,62 50,62" fill="white"/>
  <!-- Cleaner arrow: use a path for a sharp chevron -->
  <!-- Remove the polygon above and use this clean arrowhead -->
  <path d="M83 28 L110 58 L98 58 L98 52 L68 52 L68 58 L56 58 Z" fill="url(#arrowGrad)"/>
  <!-- Re-draw stem top to sit flush -->
  <rect x="74" y="52" width="18" height="10" rx="0" fill="white"/>

  <!-- ═══════════════════════════════════════ -->
  <!--  WORDMARK                              -->
  <!-- ═══════════════════════════════════════ -->
  <text
    x="208"
    y="122"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="72"
    font-weight="700"
    letter-spacing="-2"
    fill="url(#brandGrad)"
  >Finnova</text>

  <!-- Thin tagline -->
  <text
    x="211"
    y="148"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="16"
    font-weight="400"
    letter-spacing="5"
    fill="#6D28D9"
    opacity="0.75"
  >FINANCIAL INNOVATION</text>
</svg>
